name: Pull Request Checks

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  translations-review-page-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run focused logic test
        run: npm run test:translations-review-page-logic
